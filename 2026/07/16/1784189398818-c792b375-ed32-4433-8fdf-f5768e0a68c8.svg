<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320">
  <rect width="700" height="320" fill="#f8f9fa" rx="8"/>
  <rect x="0" y="0" width="700" height="320" fill="none" stroke="#dee2e6" stroke-width="1" rx="8"/>
  <text x="350" y="30" text-anchor="middle" font-family="'Microsoft YaHei','PingFang SC',sans-serif" font-size="15" font-weight="bold" fill="#2c3e50">獴探·智写 效果三问</text>
  
  <!-- Card 1: 快 -->
  <g transform="translate(25, 55)">
    <rect width="200" height="220" rx="10" fill="#e8f0fe" stroke="#1a6bff" stroke-width="1.5"/>
    <rect x="0" y="0" width="200" height="60" rx="10" fill="#1a6bff"/>
    <rect x="0" y="30" width="200" height="30" fill="#1a6bff"/>
    <text x="100" y="30" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="28" font-weight="bold" fill="#fff">快</text>
    <text x="100" y="50" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="13" fill="#fff" opacity="0.85">3-4小时交付</text>
    
    <text x="100" y="85" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="20" font-weight="bold" fill="#1a6bff">~90%</text>
    <text x="100" y="105" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="11" fill="#555">效率提升</text>
    
    <line x1="15" y1="118" x2="185" y2="118" stroke="#1a6bff" stroke-width="0.5" opacity="0.2"/>
    
    <text x="15" y="140" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#444">初稿生成</text>
    <text x="185" y="140" text-anchor="end" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1a6bff">约1h</text>
    <text x="15" y="160" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#444">人工精修</text>
    <text x="185" y="160" text-anchor="end" font-family="sans-serif" font-size="10" font-weight="bold" fill="#1a6bff">约2-3h</text>
    <text x="15" y="180" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#444">传统方式</text>
    <text x="185" y="180" text-anchor="end" font-family="sans-serif" font-size="10" fill="#999">3-5天</text>
    
    <rect x="15" y="195" width="170" height="1" fill="#1a6bff" opacity="0.15"/>
  </g>
  
  <!-- Card 2: 准 -->
  <g transform="translate(250, 55)">
    <rect width="200" height="220" rx="10" fill="#fff3e0" stroke="#ff6b35" stroke-width="1.5"/>
    <rect x="0" y="0" width="200" height="60" rx="10" fill="#ff6b35"/>
    <rect x="0" y="30" width="200" height="30" fill="#ff6b35"/>
    <text x="100" y="30" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="28" font-weight="bold" fill="#fff">准</text>
    <text x="100" y="50" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="13" fill="#fff" opacity="0.85">数据可追溯</text>
    
    <text x="15" y="85" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">来源可追溯</text>
    <text x="15" y="105" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#555">政策引用标注文号</text>
    <text x="15" y="125" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#555">案例标注来源</text>
    
    <line x1="15" y1="138" x2="185" y2="138" stroke="#ff6b35" stroke-width="0.5" opacity="0.2"/>
    
    <text x="15" y="158" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">表格联动</text>
    <text x="15" y="178" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#555">修改任意数据自动更新</text>
    <text x="15" y="198" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#555">关联表格同步刷新</text>
  </g>
  
  <!-- Card 3: 合规 -->
  <g transform="translate(475, 55)">
    <rect width="200" height="220" rx="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1.5"/>
    <rect x="0" y="0" width="200" height="60" rx="10" fill="#2e7d32"/>
    <rect x="0" y="30" width="200" height="30" fill="#2e7d32"/>
    <text x="100" y="30" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="28" font-weight="bold" fill="#fff">合规</text>
    <text x="100" y="50" text-anchor="middle" font-family="'Microsoft YaHei',sans-serif" font-size="13" fill="#fff" opacity="0.85">自动校验</text>
    
    <text x="15" y="85" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">规范条文库</text>
    <text x="15" y="105" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#555">内置515号文、编制大纲</text>
    <text x="15" y="125" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#555">T/CECS 1470-2024等</text>
    
    <line x1="15" y1="138" x2="185" y2="138" stroke="#2e7d32" stroke-width="0.5" opacity="0.2"/>
    
    <text x="15" y="158" font-family="'Microsoft YaHei',sans-serif" font-size="11" font-weight="bold" fill="#2c3e50">逐条比对</text>
    <text x="15" y="178" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#555">自动标记不合规项</text>
    <text x="15" y="198" font-family="'Microsoft YaHei',sans-serif" font-size="10" fill="#555">人工复核确认/修改</text>
  </g>
  
  <text x="690" y="312" text-anchor="end" font-family="sans-serif" font-size="9" fill="#aaa">清源智界 · 獴探</text>
</svg>
