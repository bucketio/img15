<svg width="1200" height="700" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">本子把脉诊断维度</title>
  <desc id="desc">An infographic showing the audit dimensions for an NSFC application draft.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#f0fdfa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.11"/>
    </filter>
  </defs>
  <rect width="1200" height="700" rx="34" fill="url(#bg)"/>
  <rect x="44" y="44" width="1112" height="612" rx="28" fill="#ffffff" opacity="0.82" stroke="#dbeafe"/>
  <text x="92" y="106" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="38" font-weight="800" fill="#0f172a">一次检查，看哪些维度</text>
  <text x="94" y="145" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="20" fill="#475569">不是逐句润色，而是检查章节之间是否互相支撑</text>

  <g filter="url(#shadow)">
    <circle cx="600" cy="390" r="104" fill="#0f766e"/>
    <circle cx="600" cy="390" r="82" stroke="#99f6e4" stroke-width="2"/>
    <text x="600" y="378" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="30" font-weight="800" fill="#ffffff">本子把脉</text>
    <text x="600" y="414" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="18" fill="#ccfbf1">结构诊断</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="116" y="278" width="214" height="86" rx="18" fill="#ecfeff" stroke="#99f6e4"/>
    <text x="223" y="313" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="800" fill="#115e59">题目与摘要</text>
    <text x="223" y="343" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#475569">对象、问题、路径</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="164" y="454" width="230" height="86" rx="18" fill="#eff6ff" stroke="#bfdbfe"/>
    <text x="279" y="489" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="800" fill="#1d4ed8">立项依据</text>
    <text x="279" y="519" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#475569">研究现状是否引出项目</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="442" y="182" width="316" height="86" rx="18" fill="#fef3c7" stroke="#fde68a"/>
    <text x="600" y="217" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="800" fill="#92400e">关键科学问题</text>
    <text x="600" y="247" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#475569">是否可研究、可验证</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="806" y="278" width="246" height="86" rx="18" fill="#f5f3ff" stroke="#ddd6fe"/>
    <text x="929" y="313" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="800" fill="#6d28d9">研究内容</text>
    <text x="929" y="343" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#475569">是否回应科学问题</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="812" y="454" width="236" height="86" rx="18" fill="#fff7ed" stroke="#fed7aa"/>
    <text x="930" y="489" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="800" fill="#c2410c">创新与基础</text>
    <text x="930" y="519" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#475569">创新是否有依据</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="442" y="548" width="316" height="86" rx="18" fill="#fdf2f8" stroke="#fbcfe8"/>
    <text x="600" y="583" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="22" font-weight="800" fill="#be185d">图表、形式与政策风险</text>
    <text x="600" y="613" text-anchor="middle" font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="16" fill="#475569">降低阅读成本，提示核查项</text>
  </g>

  <path d="M330 320 C395 320 451 343 507 373" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 10"/>
  <path d="M394 496 C454 470 487 452 520 428" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 10"/>
  <path d="M600 268 V286" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 10"/>
  <path d="M806 320 C736 328 699 353 682 373" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 10"/>
  <path d="M812 496 C751 470 715 447 682 426" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 10"/>
  <path d="M600 548 V494" stroke="#94a3b8" stroke-width="3" stroke-dasharray="8 10"/>
</svg>
