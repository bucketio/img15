<svg width="1200" height="820" viewBox="0 0 1200 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Type-C 线能力拆解图</title>
  <desc id="desc">Type-C 接口形状相同，但不同线材支持充电、传输、视频和认证能力不同</desc>
  <rect width="1200" height="820" fill="#f8fafc"/>
  <text x="70" y="88" fill="#111827" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="44" font-weight="700">Type-C 只是接口形状，不代表全部能力</text>
  <text x="72" y="136" fill="#475569" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="24">同样的插头，里面可能是完全不同等级的线材设计</text>
  <g transform="translate(470 200)">
    <rect x="0" y="0" width="260" height="150" rx="34" fill="#111827"/>
    <rect x="42" y="43" width="176" height="64" rx="28" fill="#374151"/>
    <rect x="78" y="58" width="104" height="34" rx="16" fill="#cbd5e1"/>
    <text x="130" y="190" text-anchor="middle" fill="#111827" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700">同一个 Type-C 插头</text>
  </g>
  <g fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round">
    <path d="M600 430 L250 500"/>
    <path d="M600 430 L500 500"/>
    <path d="M600 430 L750 500"/>
    <path d="M600 430 L1000 500"/>
  </g>
  <g font-family="Arial, 'Microsoft YaHei', sans-serif">
    <g transform="translate(80 500)">
      <rect width="250" height="220" rx="18" fill="#ffffff" stroke="#d1d5db"/>
      <circle cx="58" cy="58" r="30" fill="#0f766e"/>
      <text x="58" y="68" text-anchor="middle" fill="#ffffff" font-size="34" font-weight="700">W</text>
      <text x="28" y="115" fill="#111827" font-size="28" font-weight="700">充电功率</text>
      <text x="28" y="158" fill="#475569" font-size="21">60W / 100W / 240W</text>
      <text x="28" y="194" fill="#475569" font-size="21">看 PD 与 E-Marker</text>
    </g>
    <g transform="translate(350 500)">
      <rect width="250" height="220" rx="18" fill="#ffffff" stroke="#d1d5db"/>
      <circle cx="58" cy="58" r="30" fill="#2563eb"/>
      <text x="58" y="68" text-anchor="middle" fill="#ffffff" font-size="32" font-weight="700">↔</text>
      <text x="28" y="115" fill="#111827" font-size="28" font-weight="700">传输速度</text>
      <text x="28" y="158" fill="#475569" font-size="21">480Mbps 到 40Gbps</text>
      <text x="28" y="194" fill="#475569" font-size="21">看 USB / USB4 标识</text>
    </g>
    <g transform="translate(620 500)">
      <rect width="250" height="220" rx="18" fill="#ffffff" stroke="#d1d5db"/>
      <circle cx="58" cy="58" r="30" fill="#7c3aed"/>
      <text x="58" y="68" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700">HD</text>
      <text x="28" y="115" fill="#111827" font-size="28" font-weight="700">视频输出</text>
      <text x="28" y="158" fill="#475569" font-size="21">显示器 / 扩展坞</text>
      <text x="28" y="194" fill="#475569" font-size="21">看 DP Alt / 雷电</text>
    </g>
    <g transform="translate(890 500)">
      <rect width="250" height="220" rx="18" fill="#ffffff" stroke="#d1d5db"/>
      <circle cx="58" cy="58" r="30" fill="#d97706"/>
      <text x="58" y="68" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="700">✓</text>
      <text x="28" y="115" fill="#111827" font-size="28" font-weight="700">做工认证</text>
      <text x="28" y="158" fill="#475569" font-size="21">屏蔽 / 线芯 / 耐弯折</text>
      <text x="28" y="194" fill="#475569" font-size="21">看标注是否清楚</text>
    </g>
  </g>
</svg>
