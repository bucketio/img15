<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">知识产权防骗核验清单</title>
  <desc id="desc">展示收到可疑通知后的六步核验流程</desc>
  <rect width="1200" height="760" fill="#f6f8f7"/>
  <text x="82" y="92" fill="#17212b" font-size="48" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-weight="800">收到通知，先过这六关</text>
  <text x="82" y="142" fill="#5b6876" font-size="24" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif">不要被“今天不交就失效”“领导批了名额”“官方合作单位”这些话术推着走。</text>
  <g font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-size="25">
    <g transform="translate(92 210)">
      <rect width="1016" height="74" rx="10" fill="#ffffff" stroke="#d8e0e7" stroke-width="2"/>
      <circle cx="44" cy="37" r="22" fill="#2f6f73"/>
      <path d="M32 38l9 9 17-22" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="86" y="47" fill="#17212b" font-weight="700">看主体：</text>
      <text x="188" y="47" fill="#415161">是不是国家知识产权局、商标局、版权主管部门或你委托的备案代理机构？</text>
    </g>
    <g transform="translate(92 304)">
      <rect width="1016" height="74" rx="10" fill="#ffffff" stroke="#d8e0e7" stroke-width="2"/>
      <circle cx="44" cy="37" r="22" fill="#2f6f73"/>
      <path d="M32 38l9 9 17-22" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="86" y="47" fill="#17212b" font-weight="700">看渠道：</text>
      <text x="188" y="47" fill="#415161">能否在官方系统里查到同一事项？不要只信电话、短信、快递单。</text>
    </g>
    <g transform="translate(92 398)">
      <rect width="1016" height="74" rx="10" fill="#ffffff" stroke="#d8e0e7" stroke-width="2"/>
      <circle cx="44" cy="37" r="22" fill="#2f6f73"/>
      <path d="M32 38l9 9 17-22" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="86" y="47" fill="#17212b" font-weight="700">看费用：</text>
      <text x="188" y="47" fill="#415161">收款账户是否正规？是否要求私账、二维码、到付、押金或“加急费”？</text>
    </g>
    <g transform="translate(92 492)">
      <rect width="1016" height="74" rx="10" fill="#ffffff" stroke="#d8e0e7" stroke-width="2"/>
      <circle cx="44" cy="37" r="22" fill="#2f6f73"/>
      <path d="M32 38l9 9 17-22" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="86" y="47" fill="#17212b" font-weight="700">看期限：</text>
      <text x="188" y="47" fill="#415161">续展、年费、答复期限是否与官方规则一致？提前很多年催缴要警惕。</text>
    </g>
    <g transform="translate(92 586)">
      <rect width="1016" height="74" rx="10" fill="#ffffff" stroke="#d8e0e7" stroke-width="2"/>
      <circle cx="44" cy="37" r="22" fill="#2f6f73"/>
      <path d="M32 38l9 9 17-22" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="86" y="47" fill="#17212b" font-weight="700">看承诺：</text>
      <text x="188" y="47" fill="#415161">“包授权”“包胜诉”“包补贴”“内部名额”不是能力证明，而是风险信号。</text>
    </g>
  </g>
</svg>
