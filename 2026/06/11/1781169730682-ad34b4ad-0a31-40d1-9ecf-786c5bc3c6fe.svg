<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">知识产权领域的那些骗局封面图</title>
  <desc id="desc">以文件、盾牌、放大镜和警示标识构成的知识产权防骗主题封面</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7efe2"/>
      <stop offset="0.52" stop-color="#e9f2ee"/>
      <stop offset="1" stop-color="#f3d7c0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1f2937" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1010" cy="120" r="96" fill="#ef4444" opacity="0.12"/>
  <circle cx="170" cy="570" r="132" fill="#2f6f73" opacity="0.12"/>
  <g filter="url(#shadow)">
    <rect x="115" y="98" width="970" height="480" rx="26" fill="#fffdf7"/>
  </g>
  <g transform="translate(150 128)">
    <rect x="0" y="0" width="286" height="360" rx="18" fill="#f8fafc" stroke="#d6dee5" stroke-width="3"/>
    <rect x="38" y="54" width="210" height="18" rx="9" fill="#8194a8"/>
    <rect x="38" y="106" width="178" height="14" rx="7" fill="#c4ced8"/>
    <rect x="38" y="142" width="210" height="14" rx="7" fill="#c4ced8"/>
    <rect x="38" y="178" width="156" height="14" rx="7" fill="#c4ced8"/>
    <g transform="translate(70 230)">
      <path d="M73 0l73 28v54c0 55-33 91-73 108C33 173 0 137 0 82V28L73 0z" fill="#2f6f73"/>
      <path d="M38 92l24 24 49-66" fill="none" stroke="#fffdf7" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
  <g transform="translate(488 140)">
    <text x="0" y="66" fill="#17212b" font-size="54" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-weight="800">知识产权领域的</text>
    <text x="0" y="136" fill="#17212b" font-size="78" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif" font-weight="900">那些骗局</text>
    <rect x="0" y="172" width="410" height="4" rx="2" fill="#ef6f4d"/>
    <text x="0" y="234" fill="#435365" font-size="30" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif">从专利、商标到版权：</text>
    <text x="0" y="282" fill="#435365" font-size="30" font-family="Microsoft YaHei, PingFang SC, Arial, sans-serif">识别套路，守住钱包和权利</text>
  </g>
  <g transform="translate(880 300)">
