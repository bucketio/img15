    <line x1="145" y1="145" x2="230" y2="230" stroke="#17212b" stroke-width="22" stroke-linecap="round"/>
    <circle cx="92" cy="92" r="46" fill="#fffdf7"/>
    <path d="M92 34l50 96H42L92 34z" fill="#ef4444"/>
    <rect x="86" y="70" width="12" height="36" rx="6" fill="#fffdf7"/>
    <circle cx="92" cy="118" r="7" fill="#fffdf7"/>
