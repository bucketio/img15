<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">显示器参数选购指南封面</title>
  <desc id="desc">一台显示器旁边列出尺寸、分辨率、刷新率、色彩、HDR 和接口等关键参数。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="52%" stop-color="#eef7f1"/>
      <stop offset="100%" stop-color="#fff7e8"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1f2937"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g transform="translate(95 78)">
    <text x="0" y="0" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="58" font-weight="700" fill="#111827">买显示器</text>
    <text x="0" y="74" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="58" font-weight="700" fill="#111827">到底看哪些参数？</text>
    <text x="2" y="130" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="25" fill="#475569">把尺寸、分辨率、刷新率、色彩、HDR 和接口一次讲清楚</text>
  </g>
  <g filter="url(#shadow)" transform="translate(120 250)">
    <rect x="0" y="0" width="560" height="315" rx="18" fill="#111827"/>
    <rect x="22" y="22" width="516" height="271" rx="10" fill="url(#screen)"/>
    <rect x="250" y="315" width="60" height="52" fill="#374151"/>
    <rect x="170" y="360" width="220" height="28" rx="14" fill="#4b5563"/>
    <g opacity="0.92">
      <rect x="62" y="64" width="190" height="26" rx="13" fill="#ffffff"/>
      <rect x="62" y="112" width="390" height="16" rx="8" fill="#d1fae5"/>
      <rect x="62" y="148" width="320" height="16" rx="8" fill="#fde68a"/>
      <rect x="62" y="184" width="430" height="16" rx="8" fill="#bfdbfe"/>
      <circle cx="454" cy="80" r="42" fill="#f97316"/>
      <circle cx="454" cy="80" r="18" fill="#fff7ed"/>
    </g>
  </g>
  <g transform="translate(735 230)" font-family="Arial, 'Microsoft YaHei', sans-serif">
    <g>
      <rect width="310" height="58" rx="12" fill="#ffffff" stroke="#d7dee8"/>
      <text x="24" y="37" font-size="24" font-weight="700" fill="#111827">尺寸 ≠ 越大越好</text>
    </g>
    <g transform="translate(0 76)">
      <rect width="310" height="58" rx="12" fill="#ffffff" stroke="#d7dee8"/>
      <text x="24" y="37" font-size="24" font-weight="700" fill="#111827">2K / 4K 看清 PPI</text>
    </g>
    <g transform="translate(0 152)">
      <rect width="310" height="58" rx="12" fill="#ffffff" stroke="#d7dee8"/>
      <text x="24" y="37" font-size="24" font-weight="700" fill="#111827">高刷要看显卡和线</text>
    </g>
    <g transform="translate(0 228)">
      <rect width="310" height="58" rx="12" fill="#ffffff" stroke="#d7dee8"/>
      <text x="24" y="37" font-size="24" font-weight="700" fill="#111827">HDR 不只看贴纸</text>
    </g>
  </g>
</svg>
